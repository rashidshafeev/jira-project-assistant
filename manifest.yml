modules:
  # PRIMARY surface: a top-level entry in Jira's GLOBAL left navigation (under "Apps"),
  # reachable app-wide. This app is a cross-project triage tool driven by an in-app
  # project picker, so a global page — not a per-project one — is its natural home.
  # (We previously also shipped a `jira:projectPage`; it was dropped as redundant once
  # the global page covered the same shell — the picker switches projects either way.)
  # `layout: blank` = "a completely empty canvas for full viewport customization": no
  # Jira system header/title or breadcrumbs (we render our own chrome). There's no
  # `viewportSize`, so height auto-resizes (grows to fit). A global context carries no
  # issue and no project, so resolveForgeEntry returns `{ mode: 'page' }` and the picker
  # defaults to the first project (see app/lib/entry-context.ts).
  jira:globalPage:
    - key: project-assistant-global
      resource: main
      resolver:
        function: resolver
      title: Project Assistant
      layout: blank
      icon: panel-icon.svg
  # Collapsible item in the issue's RIGHT-HAND context sidebar (under the field groups),
  # present on EVERY issue once installed — the always-visible per-issue verdict. (We
  # trialed `jira:issuePanel` for this, but it's "click-to-add" by design and never
  # auto-shows — Atlassian FRGE-734; verified live, it didn't surface in the ••• / "+"
  # menus — so it couldn't meet "always visible on the issue" and was dropped. See
  # docs/forge-gotchas.md.) Serves the SAME `main` bundle + `resolver` as the global
  # page: the host issue in `view.getContext()` routes the bootstrap to the single-issue
  # view (mode 'panel'), so there's no second build (see app/lib/entry-context.ts).
  jira:issueContext:
    - key: project-assistant-issue-context
      resource: main
      resolver:
        function: resolver
      # `title` shows when the panel is expanded; `label` is the collapsed-row header in
      # the sidebar — both required for issueContext (icon is optional here; we reuse the
      # self-hosted SVG, bundled from frontend/public by Vite, for brand consistency).
      title: Project Assistant
      label: Project Assistant
      icon: panel-icon.svg
      # NOTE: the collapsed-header STATUS LOZENGE (showing OK/Problem without expanding)
      # is intentionally NOT set here — a manifest-literal `status` is static, and a
      # per-issue verdict would need either a `dynamicProperties` function or a resolver
      # that writes the issue-property lozenge, i.e. running `detectProblems` server-side.
      # That breaks the "no server-side business logic; frontend owns the rules" design,
      # so it's deferred as a follow-up (see docs/forge-gotchas.md).
  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: frontend/dist
    # Dev-only: with this set, `forge tunnel` proxies the Custom UI iframe to a
    # local Vite dev server on this port instead of serving the static `path`, so
    # frontend edits go live without a rebuild (see README "Live frontend dev").
    # The tunnel reads the DEPLOYED manifest, so this must be `forge deploy`d once
    # to take effect — `forge lint` alone won't. Prod still serves the built `path`.
    # Requires `npm --prefix frontend run dev` up on 5173 (+ Chrome LNA allowed).
    tunnel:
      port: 5173

permissions:
  scopes:
    # read issues, projects, statuses, priorities
    - read:jira-work
    # update issue assignee and priority (the "fix" actions)
    - write:jira-work
    # list project members / assignable users
    - read:jira-user
    # persist per-user UI table preferences (sort/filter/column layout) in
    # Forge app storage, keyed by the caller's accountId (see src/prefs.ts)
    - storage:app
  content:
    # MUI/Emotion inject CSS as inline <style> tags at runtime; the default
    # Custom UI CSP blocks inline styles, leaving the page unstyled. Allow them.
    styles:
      - unsafe-inline

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/a07afedf-b6a9-4d47-9901-71abc27811e3
